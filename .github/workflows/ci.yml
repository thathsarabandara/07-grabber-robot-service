name: Python CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Security Scan (Bandit)
      run: bandit -r app/ -ll

    - name: Lint with Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest
      run: pytest tests/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      if: github.event_name == 'push'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}

    - name: Build and push Docker image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Update GitOps Manifest Tag
      if: github.event_name == 'push'
      env:
        GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/thathsarabandara/grabber-gitops-manifests.git
        cd grabber-gitops-manifests
        
        # Extract short SHA for image tag
        IMAGE_TAG="sha-${GITHUB_SHA::7}"
        
        # Replace the image tag in the deployment manifest file
        sed -i "s|image: ghcr.io/thathsarabandara/07-grabber-robot-service:.*|image: ghcr.io/thathsarabandara/07-grabber-robot-service:$IMAGE_TAG|g" k8s/robot-service-deployment.yaml
        
        # Commit and push changes back to the manifests repo
        git add k8s/robot-service-deployment.yaml
        git commit -m "Bump Robot Service image to $IMAGE_TAG [skip ci]"
        git push origin main
