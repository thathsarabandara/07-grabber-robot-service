version: '3.8'

services:
  robot-service:
    build: .
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload
    networks:
      - api_gateway_network

networks:
  api_gateway_network:
    external: true
    name: 05-grabber-api-gateway_default
